name: Update today's fixtures

on:
  schedule:
    - cron: "5 9 * * *"  # daily at 09:05 UTC (~04:05 America/Chicago)
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate data (today only)
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: |
          node -v
          npm run build:data || node scripts/fetch-fixtures.js

      - name: Commit & push
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/topmatches.json
            git commit -m "chore: refresh today's fixtures"
            git push
          else
            echo "No changes to commit"
          fi
