name: Update clubs and fixtures (daily, Europe morning)

on:
  schedule:
    # 04:10 UTC ≈ early morning Central Europe (handles DST reasonably)
    - cron: "10 4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci || npm i

      # --- EuroClubIndex -> clubs.json (Puppeteer) ---
      - name: Update top clubs from EuroClubIndex
        run: npm run update:clubs

      # --- Your existing fixtures step (kept as-is) ---
      - name: Build today's fixtures
        run: npm run build:data

      # Commit any changes (clubs.json / data/*)
      - name: Commit & push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily update (clubs & fixtures)"
            git push
          fi
