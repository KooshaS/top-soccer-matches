<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Top Soccer Matches — Today</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      :root { --bg:#0b0b0c; --card:#121215; --fg:#e7e7ea; --muted:#9ea0a6; --accent:#5ee0a0; --border:#1e1f24; }
      *{box-sizing:border-box} html,body{height:100%}
      body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;background:var(--bg);color:var(--fg)}
      .wrap{max-width:880px;margin:0 auto;padding:40px 20px 80px}
      header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:10px}
      h1{font-size:20px;letter-spacing:.3px;margin:0}
      .muted{color:var(--muted)}
      .pill{display:inline-flex;align-items:center;gap:8px;padding:6px 10px;border:1px solid var(--border);border-radius:999px;background:#0f0f12;font-size:12px;color:var(--muted)}
      .card{border:1px solid var(--border);background:var(--card);border-radius:16px;padding:14px 16px}
      .grid{display:grid;gap:12px}
      .match{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;padding:10px 12px;border-radius:12px}
      .match:hover{background:rgba(255,255,255,.03)}
      .team{overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
      .vs{font-weight:700;color:var(--muted)}
      .meta{display:flex;gap:10px;align-items:center;font-size:12px;color:var(--muted);margin-top:6px}
      .empty{color:var(--muted);padding:14px;text-align:center;border:1px dashed var(--border);border-radius:12px}
      footer{margin-top:24px;color:var(--muted);font-size:12px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
      a{color:var(--fg);text-decoration:none;border-bottom:1px dotted var(--border)}
      a:hover{border-color:var(--fg)}
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>Top Soccer Matches — Today</h1>
        <span id="clubCount" class="pill" title="Number of top clubs configured"></span>
      </header>

      <p id="today" class="muted" style="margin:0 0 16px 0;"></p>

      <section class="card">
        <div class="grid" id="list"></div>
      </section>

      <footer>
        <span id="generated"></span>
        <span>Open-source on <a href="https://github.com/" target="_blank" rel="noreferrer">GitHub</a></span>
      </footer>
    </div>

    <script>
      // Force the *day label* to display in UTC to avoid date shifting
      const fmtLongDate = (isoDate) =>
        new Date(isoDate + 'T00:00:00Z').toLocaleDateString(
          undefined,
          { weekday:'long', month:'long', day:'numeric', year:'numeric', timeZone: 'UTC' }
        );

      // Keep kickoff times in the visitor's local time (add timeZone:'UTC' if you prefer UTC)
      const fmtTime = (iso) =>
        iso ? new Date(iso).toLocaleTimeString(undefined, { hour:'2-digit', minute:'2-digit' }) : 'TBD';

      async function load() {
        const [clubsRes, dataRes] = await Promise.all([
          fetch('clubs.json'),
          fetch('data/topmatches.json', { cache: 'no-store' })
        ]);

        const clubs = await clubsRes.json();
        const data = dataRes.ok ? await dataRes.json() : { date: new Date().toISOString().slice(0,10), matches: [] };

        document.getElementById('clubCount').textContent = `${clubs.clubs.length} top clubs`;
        document.getElementById('today').textContent = fmtLongDate(data.date);

        const list = document.getElementById('list');
        const generated = document.getElementById('generated');
        generated.textContent = data.generated_at ? `Updated ${new Date(data.generated_at).toLocaleString()}` : 'Awaiting first data refresh…';

        const matches = data.matches || [];
        if (matches.length === 0) {
          list.innerHTML = `<div class="empty">No top matches today.</div>`;
          return;
        }
        list.innerHTML = matches.map(m => `
          <div class="match" title="${m.competition || ''}">
            <div class="team">${m.home}</div>
            <div class="vs">vs</div>
            <div class="team" style="text-align:right">${m.away}</div>
            <div class="meta">
              <span>${fmtTime(m.kickoff_utc)}</span>
              ${m.competition ? `<span>· ${m.competition}</span>` : ''}
              ${m.venue ? `<span>· ${m.venue}</span>` : ''}
            </div>
          </div>`).join('');
      }

      load();
    </script>
  </body>
</html>
